<!DOCTYPE html>
<html lang="de">
<head>

  <!-- Zeichensatz: verhindert kaputte Umlaute (ä, ö, ü) -->
  <meta charset="UTF-8">

  <!-- Damit die Seite auf Smartphones nicht winzig aussieht -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Dieser Text erscheint im Browser-Tab -->
  <title>Dein Name</title>

  <style>

    /* Der gesamte Seiteninhalt */
    body {
      font-family: sans-serif;   /* schlichte Systemschrift */
      max-width: 640px;          /* nicht zu breit auf großen Bildschirmen */
      margin: 4rem auto;         /* zentriert + Abstand oben/unten */
      padding: 0 1.5rem;         /* Seitenabstand auf kleinen Bildschirmen */
      line-height: 1.7;          /* angenehmer Zeilenabstand */
      color: #222;               /* weiches Dunkelgrau statt hartem Schwarz */
      background: #fff;
    }

    /* Die große Überschrift mit deinem Namen */
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
    }

    /* Alle normalen Textabsätze */
    p {
      margin-top: 0;
      margin-bottom: 1rem;
    }

    /* Der Kontakt-Link */
    a {
      color: #222;               /* gleiche Farbe wie der Rest – dezent */
    }

  </style>
</head>
<body>

  <!-- Dein Name als Hauptüberschrift – hier anpassen -->
  <h1>Dein Name</h1>

  <!-- Berufsbezeichnung oder Rolle – hier anpassen -->
  <p>Deine Berufsbezeichnung oder Rolle in einem Satz.</p>

  <!-- Kurze Selbstbeschreibung – hier anpassen -->
  <p>Ein kurzer Satz über dich, deine Arbeit oder dein Angebot.</p>

  <!-- E-Mail-Adresse – du@beispiel.de durch deine echte Adresse ersetzen -->
  <p><a href="mailto:du@beispiel.de">du@beispiel.de</a></p>

</body>
</html>
